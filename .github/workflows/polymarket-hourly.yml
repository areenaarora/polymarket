name: polymarket-hourly-scrape

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # hourly (UTC)

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape_polymarket.py

      - name: Commit and push data changes
        run: |
          git config user.name "polymarket-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(data): hourly polymarket snapshot"
          git push
